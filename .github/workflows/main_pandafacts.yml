# Nome do fluxo de trabalho (Workflow) de CI/CD para identificar no GitHub Actions [cite: 28]
name: Build and deploy Python app to Azure Web App - pandafacts

# Define os gatilhos: o pipeline roda ao fazer 'push' na branch main ou manualmente [cite: 28]
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Conjunto de tarefas organizadas em estágios (jobs) [cite: 28]
jobs:
  # Primeiro estágio: Compilação e preparação dos arquivos [cite: 28]
  build:
    # Máquina virtual Linux onde os comandos serão executados [cite: 28]
    runs-on: ubuntu-latest
    # Permissões necessárias para ler o código do repositório [cite: 28]
    permissions:
      contents: read 

    steps:
      # Passo 1: Copia o código do repositório para dentro da máquina virtual [cite: 28]
      - uses: actions/checkout@v4

      # NOVO STEP DO EXERCÍCIO 3: Imprime mensagem no console antes do build [cite: 29, 31]
      - name: Log de Inicio
        [cite_start]run: echo "Iniciando o deploy do meu projeto!" [cite: 31]

      # Passo 2: Configura a versão do Python 3.14 na máquina do pipeline [cite: 28]
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Passo 3: Cria ambiente virtual e instala as bibliotecas do requirements.txt [cite: 28]
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # Passo 4: Empacota os arquivos (exceto o venv) para enviar ao estágio de deploy [cite: 28]
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  # Segundo estágio: Publicação efetiva na Azure [cite: 28]
  deploy:
    # Define que este estágio depende do sucesso do estágio 'build' [cite: 28]
    runs-on: ubuntu-latest
    needs: build
    # Permissões para autenticação via token na nuvem [cite: 28]
    permissions:
      id-token: write 
      contents: read 

    steps:
      # Passo 5: Baixa os arquivos que foram empacotados no estágio de build [cite: 28]
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      # Passo 6: Autentica na sua conta Azure usando segredos de segurança [cite: 28]
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F71A4F46390404C9259BDD82774D669 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE230410AE20473B918092EA9D433AB2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_17C69E55D7474D13BA86458280571521 }}

      # Passo 7: Envia os arquivos para o AppService chamado 'pandafacts' na Azure [cite: 28]
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'pandafacts'
          slot-name: 'Production'
